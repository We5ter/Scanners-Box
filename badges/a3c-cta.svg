<svg xmlns="http://www.w3.org/2000/svg" width="192" height="30" viewBox="0 0 192 30">
  <defs>
    <clipPath id="c"><rect width="192" height="30" rx="5"/></clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="sh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.26)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#c)">
    <rect width="192" height="30" fill="url(#bg)"/>
    <!-- Shimmer sweep -->
    <rect width="90" height="30" fill="url(#sh)">
      <animate attributeName="x" values="-90;192" dur="2.2s" repeatCount="indefinite"
               calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.6 1"/>
    </rect>
  </g>

  <!-- Subtle border -->
  <rect width="192" height="30" rx="5" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

  <!-- "Visit Project A³C" label -->
  <text x="84" y="20" text-anchor="middle"
        font-family="DejaVu Sans,Verdana,Geneva,sans-serif"
        font-size="12" fill="white" font-weight="700">Visit Project A³C</text>

  <!-- Animated arrow -->
  <g>
    <animateTransform attributeName="transform" type="translate"
                      values="0,0;7,0;0,0" dur="1.4s" repeatCount="indefinite"
                      calcMode="spline" keyTimes="0;0.5;1"
                      keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <text x="157" y="20.5" text-anchor="middle"
          font-family="DejaVu Sans,Verdana,Geneva,sans-serif"
          font-size="15" fill="rgba(255,255,255,0.92)" font-weight="700">→</text>
  </g>
</svg>
